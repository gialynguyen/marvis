<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marvis Trading Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      background: #161b22;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
    }

    .header h1 span {
      color: #58a6ff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #8b949e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #3fb950;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .table-wrapper {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #1c2129;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #8b949e;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #21262d;
    }

    th:not(:first-child) {
      text-align: right;
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid #21262d;
      transition: background 0.15s;
    }

    td:not(:first-child) {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #1c2129;
    }

    .symbol {
      font-weight: 600;
      color: #e6edf3;
    }

    .price {
      font-weight: 500;
      font-size: 15px;
    }

    .price.flash-up {
      animation: flashGreen 0.6s ease-out;
    }

    .price.flash-down {
      animation: flashRed 0.6s ease-out;
    }

    .positive {
      color: #3fb950;
    }

    .negative {
      color: #f85149;
    }

    .neutral {
      color: #8b949e;
    }

    .volume {
      color: #8b949e;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }

    .error {
      text-align: center;
      padding: 20px;
      color: #f85149;
      background: #1c1012;
      border: 1px solid #f8514930;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    @keyframes flashGreen {
      0% { background: #3fb95020; }
      100% { background: transparent; }
    }

    @keyframes flashRed {
      0% { background: #f8514920; }
      100% { background: transparent; }
    }

    .last-updated {
      text-align: right;
      padding: 12px 16px;
      font-size: 12px;
      color: #484f58;
      background: #1c2129;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Marvis</span> Trading Dashboard</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="container">
    <div id="error" class="error" style="display: none;"></div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Price</th>
            <th>24h Change</th>
            <th>24h High</th>
            <th>24h Low</th>
            <th>Volume</th>
          </tr>
        </thead>
        <tbody id="tickerBody">
          <tr>
            <td colspan="6" class="loading">Loading prices...</td>
          </tr>
        </tbody>
      </table>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
